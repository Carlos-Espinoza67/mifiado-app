<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Contenedor App Icon iOS style -->
  <rect width="512" height="512" rx="114" fill="url(#grad)" />
  
  <g transform="translate(106, 150)" filter="url(#shadow)">
    <!-- Billete asomándose -->
    <rect x="40" y="-30" width="220" height="80" rx="15" fill="#4ade80" />
    <!-- Texto billete -->
    <text x="150" y="25" font-family="-apple-system, sans-serif" font-size="55" font-weight="800" fill="#166534" text-anchor="middle">$</text>
    
    <!-- Cuerpo de la billetera -->
    <rect x="0" y="20" width="300" height="180" rx="35" fill="#ffffff" />
    
    <!-- Detalle cierre billetera -->
    <path d="M 0 60 Q 150 130 300 60 L 300 20 Q 150 20 0 20 Z" fill="#f0f9ff" />
    
    <!-- Botón / Hebilla -->
    <rect x="230" y="80" width="80" height="90" rx="20" fill="#e0f2fe" />
    <circle cx="270" cy="125" r="16" fill="#0284c7" />
  </g>
</svg>
